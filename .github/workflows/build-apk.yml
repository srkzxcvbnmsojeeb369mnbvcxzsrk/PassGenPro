name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup google-services.json
        run: |
          cat > android/app/google-services.json << 'JSON'
          {"project_info":{"project_number":"000000000000","project_id":"passgen-pro","storage_bucket":"passgen-pro.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"bd.iam.sojib.passgen"}},"api_key":[{"current_key":"dummy_key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          JSON

      - name: Bundle HTML into assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html android/app/src/main/assets/www/

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build Release APK
        run: |
          cd android
          gradle assembleRelease --no-daemon 2>&1 | head -80

      - name: Find and upload APK
        run: |
          echo "=== Searching for APK ==="
          find android -name "*.apk" 2>/dev/null || echo "No APK found"
          find android -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PassGenPro-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
