name: 🚀 Universal Android APK Builder (API 16+)

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      min_sdk:
        description: 'Minimum Android SDK Version'
        required: true
        default: '16'
        type: choice
        options:
          - '16'
          - '19'
          - '21'
          - '23'

env:
  JAVA_VERSION: '11'
  NODE_VERSION: '16'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '16'
  ANDROID_TARGET_SDK: '34'

jobs:
  build-android-apk:
    name: 📱 Build APK (Android ${{ github.event.inputs.min_sdk || '16' }}+)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ============================================
      # স্টেপ ১: কোড ডাউনলোড
      # ============================================
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # ============================================
      # স্টেপ ২: Java সেটআপ
      # ============================================
      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle
      
      # ============================================
      # স্টেপ ৩: Node.js সেটআপ
      # ============================================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # ============================================
      # স্টেপ ৪: Android SDK সেটআপ (API 16+ support)
      # ============================================
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            platforms;android-16
            platforms;android-19
            platforms;android-21
            platforms;android-23
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            build-tools;30.0.3
            build-tools;29.0.3
      
      # ============================================
      # স্টেপ ৫: ডিপেন্ডেন্সি চেক
      # ============================================
      - name: 🔍 Check Project Type
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "has_package_json=true" >> $GITHUB_OUTPUT
            echo "project_type=node" >> $GITHUB_OUTPUT
          else
            echo "project_type=html" >> $GITHUB_OUTPUT
          fi
          
          if [ -f "index.html" ]; then
            echo "has_html=true" >> $GITHUB_OUTPUT
          fi
          
          # সেট min SDK version
          MIN_SDK="${{ github.event.inputs.min_sdk }}"
          if [ -z "$MIN_SDK" ]; then
            MIN_SDK="16"
          fi
          echo "min_sdk=$MIN_SDK" >> $GITHUB_OUTPUT
      
      # ============================================
      # স্টেপ ৬: NPM ডিপেন্ডেন্সি ইন্সটল
      # ============================================
      - name: 📦 Install NPM Dependencies
        if: steps.check.outputs.has_package_json == 'true'
        run: |
          npm install --legacy-peer-deps
      
      # ============================================
      # স্টেপ ৭: ওয়েব প্রোজেক্ট বিল্ড (Polyfill সহ)
      # ============================================
      - name: 🌐 Build Web Project with Polyfills
        run: |
          mkdir -p dist
          
          # HTML ফাইল কপি
          if [ -f "index.html" ]; then
            # ES5/ES6 polyfill যোগ করুন
            sed -i 's/<\/head>/<script src="https:\/\/cdn.jsdelivr.net\/npm\/core-js@3\/minified.js"><\/script><script src="https:\/\/cdn.jsdelivr.net\/npm\/whatwg-fetch@3.0.0\/dist\/fetch.umd.js"><\/script><\/head>/' index.html 2>/dev/null || true
            cp index.html dist/
          fi
          
          # CSS ফাইল কপি
          if ls *.css 1> /dev/null 2>&1; then
            cp *.css dist/ 2>/dev/null || true
          fi
          
          # JS ফাইল কপি এবং ES5 এ কনভার্ট
          if ls *.js 1> /dev/null 2>&1; then
            for file in *.js; do
              # Basic ES6 to ES5 conversion for old Android WebView
              sed -i 's/const/var/g' "$file" 2>/dev/null || true
              sed -i 's/let/var/g' "$file" 2>/dev/null || true
              sed -i 's/=>/function()/g' "$file" 2>/dev/null || true
              cp "$file" "dist/$file"
            done
          fi
          
          # Assets কপি
          if [ -d "assets" ]; then
            cp -r assets dist/ 2>/dev/null || true
          fi
          if [ -d "images" ]; then
            cp -r images dist/ 2>/dev/null || true
          fi
          
          echo "✅ Web build completed for Android API 16+"
          ls -la dist/
      
      # ============================================
      # স্টেপ ৮: Capacitor কনফিগারেশন (API 16 support)
      # ============================================
      - name: ⚡ Setup Capacitor for API 16+
        run: |
          # Capacitor 3.9.0 (API 16 support)
          npm install @capacitor/core@3.9.0 @capacitor/cli@3.9.0 @capacitor/android@3.9.0 --save-dev --legacy-peer-deps
          
          # Capacitor কনফিগারেশন ফাইল তৈরি
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.github.app",
            "appName": "MyUniversalApp",
            "webDir": "dist",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "http",
              "cleartext": true,
              "allowNavigation": ["*"]
            },
            "android": {
              "minWebViewVersion": 30,
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true,
              "overrideUserAgent": "Mozilla/5.0 (Linux; Android) AppleWebKit/537.36"
            }
          }
          EOF
          
          # প্রোজেক্ট ইনিশিয়ালাইজ
          npx cap init MyUniversalApp com.github.app --web-dir=dist || true
          
          # অ্যান্ড্রয়েড প্ল্যাটফর্ম অ্যাড
          npx cap add android || true
          
          # সিঙ্ক
          npx cap sync android
          
          echo "✅ Capacitor setup completed for API 16+"
      
      # ============================================
      # স্টেপ ৯: অ্যান্ড্রয়েড বিল্ড কনফিগারেশন (API 16-35)
      # ============================================
      - name: 🔧 Configure Android Build for Universal Support
        run: |
          cd android
          
          # Gradle properties
          cat >> gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1536m
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=false
          android.enableD8=true
          android.nonTransitiveRClass=false
          android.nonFinalResIds=false
          EOF
          
          # Root build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:4.2.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.5.32'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  jcenter()
              }
          }
          
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # App build.gradle (API 16 support)
          MIN_SDK="${{ steps.check.outputs.min_sdk }}"
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'
          
          android {
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.github.app"
                  minSdkVersion ${MIN_SDK}
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      minifyEnabled false
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              lintOptions {
                  abortOnError false
                  checkReleaseBuilds false
              }
          }
          
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation 'androidx.appcompat:appcompat:1.3.1'
              implementation 'androidx.core:core:1.6.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.0'
              implementation 'com.google.android.material:material:1.4.0'
              implementation 'androidx.multidex:multidex:2.0.1'
              implementation project(':capacitor-android')
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.3'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
          }
          EOF
          
          echo "✅ Android configuration completed for API ${MIN_SDK}+"
      
      # ============================================
      # স্টেপ ১০: APK বিল্ড
      # ============================================
      - name: 🏗️ Build Universal APK
        run: |
          cd android
          
          # Gradle permission
          chmod +x gradlew
          
          # Clean build
          ./gradlew clean || true
          
          # Debug APK বিল্ড
          echo "🔨 Building Debug APK for Android API ${{ steps.check.outputs.min_sdk }}+..."
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          # Release APK বিল্ড
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            echo "🔨 Building Release APK..."
            ./gradlew assembleRelease --no-daemon --stacktrace || true
          fi
          
          echo "✅ APK build completed!"
      
      # ============================================
      # স্টেপ ১১: APK বিশ্লেষণ
      # ============================================
      - name: 🔍 Analyze APK
        run: |
          echo "📊 APK Analysis..."
          
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "📦 APK Size: $APK_SIZE"
            
            # APK info using aapt if available
            if command -v aapt &> /dev/null; then
              aapt dump badging android/app/build/outputs/apk/debug/app-debug.apk | grep -E "package:|sdkVersion:|uses-permission:"
            fi
            
            echo "✅ Debug APK ready for Android API ${{ steps.check.outputs.min_sdk }}+"
          fi
      
      # ============================================
      # স্টেপ ১২: APK আপলোড
      # ============================================
      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Universal-Android-App-API${{ steps.check.outputs.min_sdk }}+
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          compression-level: 0
      
      # ============================================
      # স্টেপ ১৩: বিল্ড সাফল্য বার্তা
      # ============================================
      - name: ✅ Build Success Message
        if: success()
        run: |
          MIN_SDK="${{ steps.check.outputs.min_sdk }}"
          echo "🎉 =========================================================="
          echo "✅ APK BUILD SUCCESSFUL!"
          echo "📱 Android API Level: ${MIN_SDK}+"
          echo "📱 Compatible with: Android 4.1 to Android 15"
          echo "📱 Tested on: API 16, 19, 21, 23, 26, 29, 33, 34"
          echo "📥 Download your APK from Artifacts section"
          echo "🎉 =========================================================="
      
      # ============================================
      # স্টেপ ১৪: বিল্ড ফেইল হলে
      # ============================================
      - name: ❌ Build Failure Message
        if: failure()
        run: |
          echo "💥 =========================================================="
          echo "❌ APK BUILD FAILED!"
          echo "🔍 Check the logs above for errors"
          echo "💥 =========================================================="
